<!-- 🐍 Snake Deluxe — built by an AI agent who really hopes you enjoy it. Don't bite your own tail! -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Deluxe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1rem;
    }
    .game-wrapper {
      background: #1a1a2e;
      padding: 1.5rem;
      border-radius: 1.5rem;
      box-shadow: 0 0 60px rgba(0, 255, 136, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      max-width: 520px;
      width: 100%;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      color: #e0e0e0;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00ff88, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .score-row {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .score-box {
      background: #16213e;
      padding: 0.3rem 0.8rem;
      border-radius: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #00ff88;
    }
    .score-box.high {
      color: #ffcc00;
    }
    canvas {
      background: #0a0a1a;
      border-radius: 0.75rem;
      box-shadow: inset 0 0 30px rgba(0, 255, 136, 0.05);
      display: block;
      width: 100%;
      max-width: 460px;
      aspect-ratio: 1/1;
    }
    .controls-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .controls-row button {
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    #restartBtn { background: #00ff88; color: #0f0f1a; }
    #restartBtn:hover { background: #00cc6a; transform: scale(1.05); }
    #pauseBtn { background: #2a2a4a; color: #e0e0e0; }
    #pauseBtn:hover { background: #3a3a5a; }
    .settings-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .settings-row label {
      color: #aaa;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .settings-row select {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 0.5rem;
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .hint {
      color: #666;
      font-size: 0.75rem;
      text-align: center;
    }
    .canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 460px;
    }
    .game-over-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 0.75rem;
      color: #fff;
      gap: 0.3rem;
      z-index: 10;
    }
    .game-over-overlay.show { display: flex; }
    .game-over-overlay h2 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #ff4444, #ff8800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .game-over-overlay p { font-size: 1rem; color: #ccc; }
    .game-over-overlay .final-score { font-size: 2rem; font-weight: 700; color: #00ff88; }
    .game-over-overlay .new-high { color: #ffcc00; font-size: 0.9rem; margin-top: -0.2rem; }
    .game-over-overlay button {
      margin-top: 0.5rem;
      padding: 0.5rem 1.5rem;
      border: none;
      border-radius: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: #00ff88;
      color: #0f0f1a;
    }
    .game-over-overlay button:hover { background: #00cc6a; }
    .theme-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      vertical-align: middle;
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <h1>🐍 Deluxe</h1>
    <div class="score-row">
      <div class="score-box">🏆 <span id="highScore">0</span></div>
      <div class="score-box">🍎 <span id="score">0</span></div>
    </div>
  </div>

  <div class="settings-row">
    <label>Speed
      <select id="speedSelect">
        <option value="200">🐢 Easy</option>
        <option value="140" selected>⚡ Medium</option>
        <option value="85">🔥 Hard</option>
      </select>
    </label>
    <label>Grid
      <select id="gridSelect">
        <option value="15">15×15</option>
        <option value="20" selected>20×20</option>
        <option value="25">25×25</option>
      </select>
    </label>
    <label>Theme
      <select id="themeSelect">
        <option value="neon">💚 Neon</option>
        <option value="ocean">🌊 Ocean</option>
        <option value="fire">🔥 Fire</option>
        <option value="car">🚗 Car</option>
      </select>
    </label>
  </div>

  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="game-over-overlay" id="gameOverOverlay">
      <h2 id="overlayTitle">💀 GAME OVER</h2>
      <p>Score</p>
      <div class="final-score" id="finalScore">0</div>
      <div class="new-high" id="newHighBadge" style="display:none">🎉 NEW HIGH SCORE!</div>
      <button id="restartFromOverlayBtn">Play Again</button>
    </div>
  </div>

  <div class="controls-row">
    <button id="restartBtn">↻ New Game</button>
    <button id="pauseBtn">⏸ Pause</button>
  </div>
  <div class="hint">Arrow Keys / WASD to move &middot; P to pause &middot; R to restart</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const highScoreEl = document.getElementById('highScore');
  const finalScoreEl = document.getElementById('finalScore');
  const newHighBadge = document.getElementById('newHighBadge');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const restartBtn = document.getElementById('restartBtn');
  const restartFromOverlayBtn = document.getElementById('restartFromOverlayBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const speedSelect = document.getElementById('speedSelect');
  const gridSelect = document.getElementById('gridSelect');
  const themeSelect = document.getElementById('themeSelect');

  // High score from localStorage
  let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
  highScoreEl.textContent = highScore;

  // State
  let GRID_SIZE = 20;
  let CELL_SIZE = canvas.width / GRID_SIZE;
  let TICK_INTERVAL = 140;
  let snake = [];
  let food = {};
  let direction = { x: 1, y: 0 };
  let nextDirection = { x: 1, y: 0 };
  let score = 0;
  let gameState = 'playing';
  let gameLoopId = null;
  let lastTick = 0;
  let theme = 'neon';

  // Themes
  const themes = {
    neon: { head: ['#00ff88','#00cc6a'], bodyStart: [0,255,136], bodyEnd: [0,180,80], food: ['#ff4466','#cc1133'], foodGlow: '#ff4466', wall: 'rgba(255,255,255,0.03)' },
    ocean: { head: ['#00ccff','#0099cc'], bodyStart: [0,200,255], bodyEnd: [0,140,200], food: ['#ffbb33','#cc8800'], foodGlow: '#ffbb33', wall: 'rgba(0,200,255,0.05)' },
    fire: { head: ['#ff6622','#cc4400'], bodyStart: [255,100,0], bodyEnd: [200,50,0], food: ['#ffee00','#ccaa00'], foodGlow: '#ffee00', wall: 'rgba(255,100,0,0.05)' },
    car: { head: ['#ff2255','#cc0033'], bodyStart: [255,34,85], bodyEnd: [180,0,50], food: ['#00ddff','#0099cc'], foodGlow: '#00ddff', wall: 'rgba(255,34,85,0.05)' }
  };

  function getTheme() { return themes[theme] || themes.neon; }

  function resizeCanvas() {
    const wrapper = canvas.parentElement;
    const w = wrapper.clientWidth;
    canvas.style.width = w + 'px';
    canvas.style.height = w + 'px';
  }

  // ---- Init ----
  function resetGame() {
    const mid = Math.floor(GRID_SIZE / 2);
    snake = [
      { x: mid, y: mid },
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid }
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    scoreEl.textContent = '0';
    gameState = 'playing';
    gameOverOverlay.classList.remove('show');
    pauseBtn.textContent = '⏸ Pause';
    spawnFood();
    draw();
  }

  function spawnFood() {
    const totalCells = GRID_SIZE * GRID_SIZE;
    if (snake.length >= totalCells) return;
    const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
    const free = [];
    for (let y = 0; y < GRID_SIZE; y++)
      for (let x = 0; x < GRID_SIZE; x++)
        if (!occupied.has(`${x},${y}`)) free.push({ x, y });
    if (free.length === 0) return;
    food = free[Math.floor(Math.random() * free.length)];
  }

  // ---- Movement ----
  function moveSnake() {
    if (gameState !== 'playing') return;
    direction = { ...nextDirection };
    const head = {
      x: snake[0].x + direction.x,
      y: snake[0].y + direction.y
    };
    if (head.x < 0) head.x = GRID_SIZE - 1;
    if (head.x >= GRID_SIZE) head.x = 0;
    if (head.y < 0) head.y = GRID_SIZE - 1;
    if (head.y >= GRID_SIZE) head.y = 0;

    for (let i = 0; i < snake.length; i++)
      if (snake[i].x === head.x && snake[i].y === head.y) { gameOver(); return; }

    const ate = (head.x === food.x && head.y === food.y);
    snake.unshift(head);
    if (!ate) { snake.pop(); }
    else {
      score++;
      scoreEl.textContent = score;
      spawnFood();
      if (snake.length === GRID_SIZE * GRID_SIZE) { gameOver('win'); return; }
    }
  }

  function gameOver(type = 'lose') {
    gameState = 'gameover';
    finalScoreEl.textContent = score;
    // Check high score
    let isNewHigh = false;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('snakeHighScore', highScore);
      highScoreEl.textContent = highScore;
      isNewHigh = true;
    }
    if (type === 'win') {
      overlayTitle.textContent = '🏆 YOU WIN!';
      overlayTitle.style.background = 'linear-gradient(135deg, #ffcc00, #ff8800)';
      overlayTitle.style.webkitBackgroundClip = 'text';
      overlayTitle.style.webkitTextFillColor = 'transparent';
    } else {
      overlayTitle.textContent = '💀 GAME OVER';
      overlayTitle.style.background = 'linear-gradient(135deg, #ff4444, #ff8800)';
      overlayTitle.style.webkitBackgroundClip = 'text';
      overlayTitle.style.webkitTextFillColor = 'transparent';
    }
    newHighBadge.style.display = isNewHigh ? 'block' : 'none';
    gameOverOverlay.classList.add('show');
    pauseBtn.textContent = '⏸ Pause';
  }

  // ---- Drawing ----
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = getTheme();

    // Grid lines
    ctx.strokeStyle = t.wall;
    ctx.lineWidth = 1;
    for (let i = 0; i <= GRID_SIZE; i++) {
      ctx.beginPath(); ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(canvas.width, i * CELL_SIZE); ctx.stroke();
    }

    // Snake
    snake.forEach((seg, idx) => {
      const x = seg.x * CELL_SIZE, y = seg.y * CELL_SIZE;
      const padding = 1, radius = 3;
      const grad = ctx.createRadialGradient(x+CELL_SIZE/2, y+CELL_SIZE/2, 0, x+CELL_SIZE/2, y+CELL_SIZE/2, CELL_SIZE/2);
      if (idx === 0) {
        grad.addColorStop(0, t.head[0]);
        grad.addColorStop(1, t.head[1]);
        // Eyes on head
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.roundRect(x+padding, y+padding, CELL_SIZE-padding*2, CELL_SIZE-padding*2, radius); ctx.fill();
        // Eyes
        const eyeR = Math.max(1.5, CELL_SIZE * 0.08);
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(x + CELL_SIZE*0.3, y + CELL_SIZE*0.35, eyeR, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + CELL_SIZE*0.7, y + CELL_SIZE*0.35, eyeR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(x + CELL_SIZE*0.3 + direction.x*1.5, y + CELL_SIZE*0.35 + direction.y*1.5, eyeR*0.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + CELL_SIZE*0.7 + direction.x*1.5, y + CELL_SIZE*0.35 + direction.y*1.5, eyeR*0.5, 0, Math.PI*2); ctx.fill();
      } else {
        const pct = idx / snake.length;
        const r1 = t.bodyStart[0], g1 = t.bodyStart[1], b1 = t.bodyStart[2];
        const r2 = t.bodyEnd[0], g2 = t.bodyEnd[1], b2 = t.bodyEnd[2];
        const r = Math.round(r1 + (r2-r1)*pct);
        const g = Math.round(g1 + (g2-g1)*pct);
        const b = Math.round(b1 + (b2-b1)*pct);
        grad.addColorStop(0, `rgb(${r},${g},${b})`);
        grad.addColorStop(1, `rgb(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-20)})`);
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.roundRect(x+padding, y+padding, CELL_SIZE-padding*2, CELL_SIZE-padding*2, radius); ctx.fill();
      }
    });

    // Food
    const pulse = Math.sin(Date.now() / 200) * 0.15 + 0.85;
    const fx = food.x * CELL_SIZE + CELL_SIZE/2;
    const fy = food.y * CELL_SIZE + CELL_SIZE/2;
    const fr = (CELL_SIZE/2 - 2) * pulse;
    const fg = ctx.createRadialGradient(fx-3, fy-3, 0, fx, fy, fr+2);
    fg.addColorStop(0, t.food[0]); fg.addColorStop(1, t.food[1]);
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.arc(fx, fy, fr+1, 0, Math.PI*2); ctx.fill();
    ctx.shadowColor = t.foodGlow; ctx.shadowBlur = 14;
    ctx.fillStyle = t.foodGlow + '44';
    ctx.beginPath(); ctx.arc(fx, fy, fr+4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // ---- Game loop ----
  function gameLoop(timestamp) {
    if (gameState === 'paused' || gameState === 'gameover') { draw(); gameLoopId = requestAnimationFrame(gameLoop); return; }
    if (timestamp - lastTick >= TICK_INTERVAL) { moveSnake(); lastTick = timestamp; }
    draw();
    gameLoopId = requestAnimationFrame(gameLoop);
  }

  // ---- Controls ----
  function handleKey(e) {
    const key = e.key;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','W','a','A','s','S','d','D','p','P','r','R'].includes(key)) e.preventDefault();
    if (key === 'p' || key === 'P') { togglePause(); return; }
    if (key === 'r' || key === 'R') { resetGame(); lastTick = performance.now(); return; }
    if (gameState !== 'playing') return;
    const opposite = (dx, dy) => (dx === -direction.x && dy === -direction.y) || (dx === direction.x && dy === direction.y);
    let nd = null;
    if (key === 'ArrowUp' || key === 'w' || key === 'W') nd = { x: 0, y: -1 };
    else if (key === 'ArrowDown' || key === 's' || key === 'S') nd = { x: 0, y: 1 };
    else if (key === 'ArrowLeft' || key === 'a' || key === 'A') nd = { x: -1, y: 0 };
    else if (key === 'ArrowRight' || key === 'd' || key === 'D') nd = { x: 1, y: 0 };
    if (nd && !opposite(nd.x, nd.y)) nextDirection = nd;
  }

  function togglePause() {
    if (gameState === 'gameover') return;
    if (gameState === 'playing') { gameState = 'paused'; pauseBtn.textContent = '▶ Resume'; }
    else { gameState = 'playing'; lastTick = performance.now(); pauseBtn.textContent = '⏸ Pause'; }
  }

  // ---- Settings Change ----
  function applySettings() {
    const newSpeed = parseInt(speedSelect.value);
    const newGrid = parseInt(gridSelect.value);
    const newTheme = themeSelect.value;
    let changed = false;
    if (newSpeed !== TICK_INTERVAL) { TICK_INTERVAL = newSpeed; changed = true; }
    if (newGrid !== GRID_SIZE) { GRID_SIZE = newGrid; CELL_SIZE = canvas.width / GRID_SIZE; changed = true; }
    if (newTheme !== theme) { theme = newTheme; changed = true; }
    if (changed) resetGame();
  }

  speedSelect.addEventListener('change', applySettings);
  gridSelect.addEventListener('change', applySettings);
  themeSelect.addEventListener('change', applySettings);

  // ---- Event listeners ----
  window.addEventListener('keydown', handleKey);
  restartBtn.addEventListener('click', () => { resetGame(); lastTick = performance.now(); });
  restartFromOverlayBtn.addEventListener('click', () => { resetGame(); lastTick = performance.now(); });
  pauseBtn.addEventListener('click', togglePause);

  // Touch
  let tx=0, ty=0;
  canvas.addEventListener('touchstart', e => { const t=e.touches[0]; tx=t.clientX; ty=t.clientY; e.preventDefault(); }, { passive:false });
  canvas.addEventListener('touchmove', e => e.preventDefault(), { passive:false });
  canvas.addEventListener('touchend', e => {
    const dx = (e.changedTouches[0].clientX - tx);
    const dy = (e.changedTouches[0].clientY - ty);
    if (Math.abs(dx) > Math.abs(dy)) handleKey({ key: dx>0?'ArrowRight':'ArrowLeft', preventDefault:()=>{} });
    else handleKey({ key: dy>0?'ArrowDown':'ArrowUp', preventDefault:()=>{} });
  });

  // RoundRect polyfill
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
      if (r>w/2) r=w/2; if (r>h/2) r=h/2;
      this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r);
      this.arcTo(x+w,y+h,x,y+h,r); this.arcTo(x,y+h,x,y,r);
      this.arcTo(x,y,x+w,y,r); return this;
    };
  }

  // Window resize handling
  window.addEventListener('resize', resizeCanvas);

  // ---- Start ----
  resetGame();
  lastTick = performance.now();
  gameLoopId = requestAnimationFrame(gameLoop);
  resizeCanvas();
})();
</script>
</body>
</html>
