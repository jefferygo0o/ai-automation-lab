<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake 🐍</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0b1020;
    color: #e6e9f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap {
    text-align: center;
    padding: 16px;
  }
  h1 {
    font-size: 28px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .sub {
    color: #8a93b2;
    font-size: 13px;
    margin-bottom: 14px;
  }
  .stage {
    position: relative;
    display: inline-block;
    background: #0f1733;
    border: 2px solid #2a335c;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  canvas {
    display: block;
    background: #0a1024;
    border-radius: 8px;
    image-rendering: pixelated;
  }
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    gap: 16px;
  }
  .score {
    font-size: 18px;
    font-weight: 600;
  }
  .score span { color: #6ee7b7; }
  .controls {
    display: flex;
    gap: 8px;
  }
  button {
    background: #1a2347;
    color: #e6e9f5;
    border: 1px solid #2a335c;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all .15s ease;
  }
  button:hover { background: #243056; border-color: #3b4790; }
  button:active { transform: translateY(1px); }
  .overlay {
    position: absolute;
    inset: 10px;
    background: rgba(10, 16, 36, 0.92);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 5;
  }
  .overlay h2 { font-size: 26px; }
  .overlay p { color: #8a93b2; font-size: 14px; }
  .overlay.hidden { display: none; }
  .keys {
    margin-top: 14px;
    color: #8a93b2;
    font-size: 12px;
  }
  kbd {
    background: #1a2347;
    border: 1px solid #2a335c;
    border-bottom-width: 2px;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: ui-monospace, monospace;
    font-size: 11px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🐍 Snake</h1>
    <div class="sub">Eat the food. Don't hit the walls. Don't eat yourself.</div>
    <div class="stage">
      <canvas id="game" width="400" height="400"></canvas>
      <div id="overlay" class="overlay">
        <h2 id="overlayTitle">Ready?</h2>
        <p id="overlayMsg">Press Space or tap Start</p>
        <button id="startBtn">Start</button>
      </div>
    </div>
    <div class="hud">
      <div class="score">Score: <span id="score">0</span></div>
      <div class="controls">
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
      </div>
    </div>
    <div class="keys">
      Move: <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
      &nbsp;·&nbsp; Pause: <kbd>Space</kbd>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayMsg = document.getElementById('overlayMsg');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');

  const GRID = 20;            // 20x20 grid
  const CELL = canvas.width / GRID; // 20px per cell
  const BASE_TICK = 130;      // ms per step (lower = harder)

  let snake, dir, nextDir, food, score, best, tickMs, running, paused, dead, rafId, lastTick;

  best = Number(localStorage.getItem('snake_best') || 0);

  function reset() {
    snake = [
      { x: 9, y: 10 },
      { x: 8, y: 10 },
      { x: 7, y: 10 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    tickMs = BASE_TICK;
    dead = false;
    paused = false;
    spawnFood();
    updateScore();
    draw();
  }

  function spawnFood() {
    while (true) {
      const fx = Math.floor(Math.random() * GRID);
      const fy = Math.floor(Math.random() * GRID);
      if (!snake.some(s => s.x === fx && s.y === fy)) {
        food = { x: fx, y: fy };
        return;
      }
    }
  }

  function step() {
    if (paused || dead) return;
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
      return gameOver();
    }
    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      // speed up slightly as you grow
      tickMs = Math.max(60, BASE_TICK - Math.floor(snake.length / 3) * 4);
      updateScore();
      spawnFood();
    } else {
      snake.pop();
    }
  }

  function draw() {
    // background
    ctx.fillStyle = '#0a1024';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(canvas.width, i * CELL);
      ctx.stroke();
    }

    // food
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.arc(fx - 3, fy - 3, 2, 0, Math.PI * 2);
    ctx.fill();

    // snake
    snake.forEach((s, i) => {
      const x = s.x * CELL;
      const y = s.y * CELL;
      const isHead = i === 0;
      ctx.fillStyle = isHead ? '#6ee7b7' : '#10b981';
      roundRect(ctx, x + 1, y + 1, CELL - 2, CELL - 2, 4);
      ctx.fill();
      if (isHead) {
        // eyes
        ctx.fillStyle = '#0a1024';
        const ex = x + CELL / 2;
        const ey = y + CELL / 2;
        const ox = dir.x * 3;
        const oy = dir.y * 3;
        ctx.beginPath();
        ctx.arc(ex + ox - 3, ey + oy - 3, 1.6, 0, Math.PI * 2);
        ctx.arc(ex + ox + 3, ey + oy - 3, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y,     x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x,     y + h, r);
    ctx.arcTo(x,     y + h, x,     y,     r);
    ctx.arcTo(x,     y,     x + w, y,     r);
    ctx.closePath();
  }

  function updateScore() {
    scoreEl.textContent = score;
  }

  function gameOver() {
    dead = true;
    running = false;
    if (score > best) {
      best = score;
      localStorage.setItem('snake_best', String(best));
    }
    overlayTitle.textContent = '💀 Game Over';
    overlayMsg.innerHTML = `Score: <b>${score}</b> · Best: <b>${best}</b>`;
    startBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }

  function loop(ts) {
    if (!running) return;
    rafId = requestAnimationFrame(loop);
    if (!lastTick) lastTick = ts;
    const elapsed = ts - lastTick;
    if (elapsed >= tickMs) {
      lastTick = ts;
      step();
      draw();
    }
  }

  function start() {
    reset();
    running = true;
    paused = false;
    overlay.classList.add('hidden');
    pauseBtn.textContent = 'Pause';
    lastTick = 0;
    rafId = requestAnimationFrame(loop);
  }

  function togglePause() {
    if (!running || dead) return;
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    if (!paused) {
      lastTick = 0;
      rafId = requestAnimationFrame(loop);
    }
  }

  function setDir(x, y) {
    // prevent reversing into yourself
    if (snake.length > 1 && (snake[0].x + x === snake[1].x && snake[0].y + y === snake[1].y)) {
      return;
    }
    nextDir = { x, y };
  }

  // keyboard
  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()) || ['w','a','s','d'].includes(k)) {
      e.preventDefault();
    }
    if (k === 'arrowup' || k === 'w') setDir(0, -1);
    else if (k === 'arrowdown' || k === 's') setDir(0, 1);
    else if (k === 'arrowleft' || k === 'a') setDir(-1, 0);
    else if (k === 'arrowright' || k === 'd') setDir(1, 0);
    else if (e.key === ' ') {
      if (!running || dead) start();
      else togglePause();
    }
  });

  // touch / swipe controls on canvas
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
    touchStart = null;
  }, { passive: true });

  startBtn.addEventListener('click', start);
  pauseBtn.addEventListener('click', togglePause);
  resetBtn.addEventListener('click', () => {
    cancelAnimationFrame(rafId);
    running = false;
    dead = false;
    overlayTitle.textContent = 'Ready?';
    overlayMsg.textContent = 'Press Space or tap Start';
    startBtn.textContent = 'Start';
    overlay.classList.remove('hidden');
    reset();
  });

  // initial state
  reset();
  overlayTitle.textContent = 'Ready?';
  overlayMsg.textContent = 'Press Space or tap Start';
  startBtn.textContent = 'Start';
})();
</script>
</body>
</html>
