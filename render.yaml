services:
  - type: web
    name: ai-automation-lab
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: LAB_PROJECT_ROOT
        value: /app
      - key: LAB_DIST
        value: /app/backend/dist-spa
      - key: LAB_AGENTS_DIR
        value: /var/data/lab/agents
      - key: LAB_SANDBOX_ROOT
        value: /var/data/lab/sandboxes
      - key: LAB_MASTER_KEY
        generateValue: true
        description: "Master key for encrypting secrets. Render auto-generates and persists this."