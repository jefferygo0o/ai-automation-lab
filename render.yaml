services:
  - type: web
    name: ai-automation-lab
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: LAB_PROJECT_ROOT
        value: /app
      - key: LAB_DIST
        value: /app/backend/dist-spa
      - key: LAB_AGENTS_DIR
        value: /var/data/lab/agents
      - key: LAB_SANDBOX_ROOT
        value: /var/data/lab/sandboxes
      - key: LAB_MASTER_KEY
        generateValue: true
        description: "Master key for encrypting secrets. Render auto-generates and persists this."
      # === Supabase config (set these in Render dashboard after deploy) ===
      - key: SUPABASE_URL
        description: "Supabase project URL (Settings → API)"
      - key: SUPABASE_SERVICE_ROLE_KEY
        description: "Supabase service_role key (NOT anon key)"
      - key: SUPABASE_SNAPSHOT_BUCKET
        value: "agent-snapshots"
        description: "Supabase Storage bucket name for agent workspace snapshots. Auto-created on first run if missing."
      - key: SUPABASE_DB_URL
        description: "Supabase DB connection string — Transaction pooler, port 6543. Example: postgresql://postgres.<ref>:<password>@aws-0-<region>.pooler.supabase.com:6543/postgres"
      # === Foundry Connect config (single API key) ===
      - key: FOUNDRY_API_URL
        value: https://api-gateway-production-4984.up.railway.app
        description: "Foundry Connect API gateway base URL"
      # Foundry API key can also be set per-user as a secret (foundry_api_key) on the Secrets page.
