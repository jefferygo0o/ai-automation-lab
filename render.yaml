services:
  - type: web
    name: ai-automation-lab
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: LAB_PROJECT_ROOT
        value: /app
      - key: LAB_DIST
        value: /app/backend/dist-spa
      - key: LAB_AGENTS_DIR
        value: /var/data/lab/agents
      - key: LAB_SANDBOX_ROOT
        value: /var/data/lab/sandboxes
      - key: LAB_MASTER_KEY
        generateValue: true
        description: "Master key for encrypting secrets. Render auto-generates and persists this."
      # === Supabase config (set these in Render dashboard after deploy) ===
      - key: SUPABASE_URL
        description: "Supabase project URL (Settings → API)"
      - key: SUPABASE_SERVICE_ROLE_KEY
        description: "Supabase service_role key (NOT anon key)"
      - key: SUPABASE_DB_URL
        description: "Supabase DB connection string — Transaction pooler, port 6543. Example: postgresql://postgres.<ref>:<password>@aws-0-<region>.pooler.supabase.com:6543/postgres"
      # === Pipedream Connect config (set these to enable OAuth integrations) ===
      - key: PIPEDREAM_CLIENT_ID
        description: "Pipedream Connect OAuth client ID"
      - key: PIPEDREAM_CLIENT_SECRET
        description: "Pipedream Connect OAuth client secret"
      - key: PIPEDREAM_PROJECT_ID
        description: "Pipedream Connect project ID"
      - key: PIPEDREAM_ENVIRONMENT
        value: production
      - key: PIPEDREAM_WEBHOOK_SIGNING_KEY
        description: "Webhook signing key from Pipedream Connect settings — used to verify OAuth webhook signatures (x-pd-webhook-signature). Add this after setting up the webhook URL in Pipedream."
